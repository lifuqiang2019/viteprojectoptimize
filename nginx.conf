server {
    listen       80;
    server_name  admin-demo.com;
    
    root   /usr/share/nginx/html/vite-admin;
    index  index.html;

    # Gzip Compression
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain application/javascript application/x-javascript text/css application/xml text/javascript application/x-httpd-php image/jpeg image/gif image/png;
    gzip_vary on;

    # SPA Routing Fallback
    location / {
        try_files $uri $uri/ /index.html;
        
        # HTML: Negotiated Cache (No-Cache)
        # Always revalidate index.html to ensure users get new JS/CSS hashes
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Static Assets (Immutable Strong Cache)
    # Vite generates filenames with hashes (e.g. assets/index.24832.js)
    # These are safe to cache forever.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    
    # Optional: Cache simulated API mock data if needed
    # location /api/ { ... }
}
