name: Admin Demo Deploy

on:
  push:
    branches:
      - optimization

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install
      run: npm install

    - name: Build
      run: npm run build

    - name: Deploy to Aliyun
      uses: easingthemes/ssh-deploy@v5.0.3
      env:
        SSH_PRIVATE_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        ARGS: "-rltgoDzvO --delete"
        SOURCE: "dist/"
        REMOTE_HOST: ${{ secrets.ALIYUN_HOST }}
        REMOTE_USER: "root"
        TARGET: "/usr/share/nginx/html/vite-admin"
